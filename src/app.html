<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<meta name="color-scheme" content="light" />
		<!-- PocketBase client — loaded as a UMD bundle from the local static
		     directory. We avoid the npm ESM build on the client because Vite's
		     HMR transform mangles a class method literally named `import(...)`
		     in the minified bundle. -->
		<script src="/pocketbase.umd.js"></script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" class="bg-app text-fg-app antialiased">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
